<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<h2>Track Order</h2>

<input id="code" placeholder="Enter order code">

<button onclick="track()">Track</button>

<p id="result"></p>

<script>

function track(){

let saved = localStorage.getItem("orderCode");

let input = document.getElementById("code").value;

if(input==saved){

document.getElementById("result").innerHTML="Processing...";

setTimeout(()=>{

document.getElementById("result").innerHTML="Order Ready";

window.open("https://wa.me/2348032390904");

},5000);

}

else{

document.getElementById("result").innerHTML="Invalid code";

}

}

</script>

</body>
</html>
