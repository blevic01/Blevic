<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blevic Delivery Tracking</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

input{
padding:10px;
width:80%;
margin-top:20px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#ff6600;
color:white;
border:none;
border-radius:6px;
margin-top:10px;
}

/* DRIVER CARD */

.driver{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* MAP */

#map{
height:300px;
width:100%;
margin-top:10px;
}

/* DELIVERY INFO */

.info{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
}

</style>

</head>

<body>

<h2>Track Your Delivery</h2>

<input id="code" placeholder="Enter Order Code">

<br>

<button onclick="track()">Track Order</button>

<!-- DRIVER PROFILE -->

<div class="driver">

<h3>Driver Information</h3>

<p><b>Name:</b> John Rider</p>

<p><b>Phone:</b> 08012345678</p>

</div>

<!-- DELIVERY DETAILS -->

<div class="info">

<p id="distance">Distance: calculating...</p>

<p id="timer">Arrival Time: --</p>

</div>

<div id="map"></div>

<script>

let map
let marker
let distance = 5

function track(){

let saved = localStorage.getItem("orderCode")
let input = document.getElementById("code").value

if(input!=saved){

alert("Invalid order code")
return

}

loadMap()
startTimer()
simulateDistance()

}

function loadMap(){

map = new google.maps.Map(document.getElementById("map"),{

zoom:14,

center:{lat:6.5244,lng:3.3792}

})

marker = new google.maps.Marker({

position:{lat:6.5244,lng:3.3792},

map:map,

icon:"https://maps.google.com/mapfiles/kml/shapes/motorcycling.png"

})

moveDriver()

}

function moveDriver(){

let lat=6.5244
let lng=3.3792

setInterval(()=>{

lat+=0.0005
lng+=0.0005

marker.setPosition({lat:lat,lng:lng})

},3000)

}

/* DISTANCE SIMULATION */

function simulateDistance(){

let d = distance

setInterval(()=>{

if(d>0){

d -= 0.5

document.getElementById("distance").innerText =
"Distance: "+d.toFixed(1)+" km away"

}

},3000)

}

/* TIMER */

function startTimer(){

let minutes = 10

let timer = setInterval(()=>{

if(minutes<=0){

document.getElementById("timer").innerText =
"Driver has arrived 🚚"

clearInterval(timer)

}else{

document.getElementById("timer").innerText =
"Arrival in "+minutes+" minutes"

minutes--

}

},60000)

}

</script>

<script src="https://maps.googleapis.com/maps/api/js"></script>

</body>
</html>
