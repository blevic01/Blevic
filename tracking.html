<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Track Order - Blevic Superstore</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:15px;
text-align:center;
}

input{
padding:10px;
width:90%;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
margin:5px;
border:none;
background:#ff6600;
color:white;
border-radius:6px;
}

.box{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}

#map{
width:100%;
height:250px;
border-radius:10px;
margin-top:10px;
}
</style>
</head>

<body>

<h2>Track Your Order</h2>

<input id="code" placeholder="Enter Order Code">
<br>
<button onclick="track()">Track Order</button>

<div id="result"></div>

<div id="map"></div>

<script>

let currentOrder = null

function track(){

let code = document.getElementById("code").value

let orders = JSON.parse(localStorage.getItem("orders")) || []

let found = orders.find(o => o.code === code)

if(found){

currentOrder = found

let itemsHTML = ""

found.items.forEach(i=>{
itemsHTML += i.name + " x" + i.qty + "<br>"
})

document.getElementById("result").innerHTML = `

<div class="box">

<b>Order Code:</b> ${found.code}<br>
<b>Status:</b> ${found.status}<br>
<b>Total:</b> ₦${found.total}<br>

<h4>Items:</h4>
${itemsHTML}

<h4>Driver:</h4>
Name: John Rider<br>
Phone: 08000000000

<p id="timer"></p>

<button onclick="contact()">Contact Store</button>

</div>

`

startTimer()

showMap(found.location)

}else{

alert("Order not found")

}

}

/* TIMER */
function startTimer(){

let time = 10
let t = setInterval(()=>{

document.getElementById("timer").innerText =
"Delivery in: " + time + " mins"

time--

if(time < 0){
clearInterval(t)
document.getElementById("timer").innerText =
"Order Delivered ✅"
}

},1000)

}

/* MAP */
function showMap(link){

let coords = link.split("=")[1].split(",")

let lat = parseFloat(coords[0])
let lng = parseFloat(coords[1])

let map = new google.maps.Map(document.getElementById("map"),{
zoom:13,
center:{lat:lat,lng:lng}
})

new google.maps.Marker({
position:{lat:lat,lng:lng},
map:map,
title:"Customer"
})

}

/* WHATSAPP */
function contact(){

let phone = "2348032390904"

let msg = "Hello, I am tracking my order " + currentOrder.code

window.open("https://wa.me/"+phone+"?text="+msg)

}

</script>

<script src="https://maps.googleapis.com/maps/api/js"></script>

</body>
</html>
