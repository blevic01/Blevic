<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blevic Login</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding-top:120px;
}

input{
padding:12px;
width:80%;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
background:#ff6600;
color:white;
border:none;
border-radius:6px;
}

</style>
</head>

<body>

<h2>Blevic Superstore</h2>

<input id="name" placeholder="Enter your name">

<br>

<button onclick="login()">Login / Sign Up</button>

<script>

function login(){

let name=document.getElementById("name").value

if(name==""){
alert("Please enter your name")
return
}

localStorage.setItem("username",name)

window.location="index.html"

}

</script>

</body>
</html>
