<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
<style>
body { font-family: Arial; background:#f2f2f2; text-align:center; padding:20px; }
input { padding:10px; margin:5px; width:80%; max-width:300px; }
button { padding:10px 15px; margin:10px; background:#ff9900; color:white; border:none; border-radius:6px; cursor:pointer; }
</style>
</head>
<body>

<h2>Login</h2>

<input id="email" placeholder="Email"><br>
<input id="password" placeholder="Password" type="password"><br>
<button onclick="login()">Login</button>

<p>No account? <a href="signup.html">Sign Up</a></p>

<script>
function login(){
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    let users = JSON.parse(localStorage.getItem("users")) || [];
    let user = users.find(u=>u.email===email && u.password===password);

    if(user){
        // Store current user
        localStorage.setItem("currentUser", JSON.stringify(user));
        // Temporary flag to show name only after login
        localStorage.setItem("loggedIn", "true");

        alert("✅ You have been logged in!");
        window.location.href = "index.html"; // redirect to homepage
    } else{
        alert("Invalid email or password");
    }
}
</script>

</body>
</html>
