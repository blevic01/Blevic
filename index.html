<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blessings Superstore</title>

<style>

body{
margin:0;
padding:0;
font-family:Arial, sans-serif;

/* BACKGROUND IMAGE */
background-image:url("https://i.postimg.cc/y8MPbn3x/file-00000000c9d07246a98b3cee735de787.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* DARK OVERLAY FOR READABILITY */
.overlay{
background:rgba(0,0,0,0.5);
height:100vh;
width:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

/* TITLE */
h1{
font-size:40px;
margin-bottom:10px;
}

/* SUB TEXT */
p{
font-size:18px;
margin-bottom:30px;
}

/* BUTTON STYLE */
button{
padding:12px 20px;
margin:8px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
background:#ff6600;
color:white;
}

button:hover{
background:#e65c00;
}

/* BUTTON CONTAINER */
.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

</style>
</head>

<body>

<div class="overlay">

<h1>Welcome to Blessings Superstore</h1>

<p>Your One-Stop Shop for Everyday Essentials</p>

<div class="buttons">

<button onclick="location.href='product.html'">Products</button>

<button onclick="location.href='cart.html'">Cart</button>

<button onclick="location.href='login.html'">Login</button>

<button onclick="location.href='signup.html'">Sign Up</button>

<button onclick="location.href='games.html'">Games</button>

<button onclick="location.href='customer-care.html'">Customer Care</button>

</div>

</div>

</body>
</html>
