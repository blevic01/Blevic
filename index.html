<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blevic Superstore</title>

<style>

body{
margin:0;
font-family:Arial;
background:url("https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png");
background-size:cover;
background-attachment:fixed;
}

.header{
background:#ff6600;
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.carticon{
font-size:20px;
cursor:pointer;
}

.menu{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:8px;
padding:10px;
}

.menu button{
padding:10px;
border:none;
background:white;
border-radius:8px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
}

.product img{
width:100%;
height:120px;
object-fit:cover;
border-radius:6px;
}

.product button{
background:#ff6600;
color:white;
border:none;
padding:8px;
border-radius:5px;
margin-top:5px;
}

</style>
</head>

<body>

<div class="header">

<div>
<b>Blevic Superstore</b><br>
<span id="welcome"></span>
</div>

<div class="carticon" onclick="goCart()">
🛒 <span id="count">0</span>
</div>

</div>


<div class="menu">

<button onclick="location.href='games.html'">🎮 Games</button>

<button onclick="location.href='tracking.html'">📦 Track Order</button>

<button onclick="customerCare()">💬 Care</button>

</div>


<div class="products" id="products"></div>


<script>

/* LOGIN NAME */

let user=localStorage.getItem("username")

if(user){
document.getElementById("welcome").innerText="Hi "+user
}


/* PRODUCTS */

let products=[

{
name:"Eva Soap",
price:500,
image:"https://images.jumia.com.ng/unsafe/fit-in/500x500/filters:fill(white)/product/97/5311513/1.jpg"
},

{
name:"Rice 5kg",
price:8500,
image:"https://i.imgur.com/BGQ1J9M.jpg"
},

{
name:"Indomie Noodles",
price:200,
image:"https://i.imgur.com/9Y6xE6E.jpg"
},

{
name:"Power Bank",
price:6500,
image:"https://i.imgur.com/YF9QK9H.jpg"
}

]


let cart=JSON.parse(localStorage.getItem("cart"))||[]


function loadProducts(){

let box=document.getElementById("products")

box.innerHTML=""

products.forEach(p=>{

box.innerHTML+=`

<div class="product">

<img src="${p.image}">

<h4>${p.name}</h4>

<p>₦${p.price}</p>

<button onclick="addCart('${p.name}',${p.price},'${p.image}')">
Add to Cart
</button>

</div>

`

})

}


function addCart(name,price,image){

let item=cart.find(p=>p.name==name)

if(item){

item.qty++

}

else{

cart.push({name,price,image,qty:1})

}

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

alert("Added to cart")

}


function updateCart(){

let total=0

cart.forEach(p=>total+=p.qty)

document.getElementById("count").innerText=total

}

function goCart(){

location.href="cart.html"

}


function customerCare(){

window.open("https://wa.me/2348032390904")

}


updateCart()

loadProducts()

</script>

</body>
</html>
