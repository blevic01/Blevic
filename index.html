<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blevic Superstore</title>
<style>
body{
    font-family:Arial;
    margin:0;
    padding:0;
    background:#f4f4f4;
}
.header{
    background:#ff9900;
    padding:15px;
    text-align:center;
    font-size:24px;
    color:white;
    font-weight:bold;
    position:sticky;
    top:0;
}
.background{
    background-image:url('https://i.postimg.cc/y8MPbn3x/file-00000000c9d07246a98b3cee735de787.png');
    background-size:cover;
    background-position:center;
    height:300px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-size:28px;
    font-weight:bold;
    text-shadow:2px 2px 5px black;
}
.welcome{
    text-align:center;
    padding:15px;
    font-size:20px;
    color:#333;
}
.main-buttons{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
    gap:15px;
}
.main-buttons button{
    background:#ff9900;
    color:white;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
    flex:1 1 120px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    transition:0.3s;
}
.main-buttons button:hover{
    background:#e68a00;
}
.floating{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff9900;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
}
.floating-customer{
    position:fixed;
    bottom:20px;
    right:90px;
    background:#ff9900;
    color:white;
    padding:15px;
    border-radius:50%;
    font-size:24px;
    cursor:pointer;
    box-shadow:0 4px 8px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<div class="header">Blevic Superstore</div>

<div class="background">Welcome to Blevic Superstore</div>

<div class="welcome" id="welcomeName"></div>

<div class="main-buttons">
    <button onclick="goProducts()">🛍 Products</button>
    <button onclick="goCart()">🛒 Cart</button>
    <button onclick="goTracking()">📦 Track Order</button>
</div>

<!-- Floating buttons -->
<div class="floating" title="Games" onclick="goGames()">🎮</div>
<div class="floating-customer" title="Customer Care" onclick="goCustomerCare()">💬</div>

<script>
// Show user name after login
let user = sessionStorage.getItem("userName");
if(user){
    document.getElementById("welcomeName").innerText = "Welcome, " + user;
}else{
    document.getElementById("welcomeName").innerText = "";
}

// Button functions
function goProducts(){ window.location.href="product.html" }
function goCart(){ window.location.href="cart.html" }
function goTracking(){ window.location.href="tracking.html" }
function goGames(){ window.location.href="games.html" }
function goCustomerCare(){ window.location.href="chat.html" }

// Admin access is hidden from normal users
function goAdmin(){
    if(sessionStorage.getItem("adminLoggedIn")==="true"){
        window.location.href="admin.html";
    } else {
        alert("Admin access only");
    }
}
</script>

</body>
</html>
