<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blevic Superstore</title>

<style>

body{
margin:0;
font-family:Arial;
background:url('https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png');
background-size:cover;
}

/* HEADER */

.header{
background:rgba(255,102,0,0.9);
color:white;
padding:12px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart{
font-size:22px;
cursor:pointer;
}

.cart span{
background:red;
border-radius:50%;
padding:3px 6px;
}

/* MENU BUTTONS */

.menu{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
padding:10px;
}

.menu button{
padding:12px;
border:none;
background:white;
border-radius:8px;
font-size:15px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.product{
background:white;
padding:10px;
border-radius:8px;
text-align:center;
}

.product img{
width:100%;
height:130px;
object-fit:cover;
border-radius:6px;
}

.price{
color:#ff6600;
font-weight:bold;
}

.rating{
color:gold;
}

button.add{
background:#ff6600;
color:white;
border:none;
padding:8px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="header">

<div id="welcome"></div>

<div class="cart" onclick="window.location='cart.html'">
🛒 <span id="cartCount">0</span>
</div>

</div>

<!-- MENU -->

<div class="menu">

<button onclick="window.location='games.html'">
🎮 Games
</button>

<button onclick="window.location='tracking.html'">
📦 Track Order
</button>

<button onclick="openWhatsApp()">
💬 Customer Care
</button>

</div>

<!-- PRODUCTS -->

<div class="products" id="products"></div>

<script>

/* LOGIN CHECK */

let user=localStorage.getItem("username")

if(!user){
window.location="login.html"
}

document.getElementById("welcome").innerText="Hi "+user

/* PRODUCTS */

let products=JSON.parse(localStorage.getItem("products")) || []

let cart=JSON.parse(localStorage.getItem("cart")) || []

function stars(n){

let s=""

for(let i=1;i<=5;i++){
s+= i<=n ? "⭐":"☆"
}

return s
}

function addCart(name,price,image){

let item=cart.find(p=>p.name==name)

if(item){item.qty++}
else{cart.push({name,price,image,qty:1})}

localStorage.setItem("cart",JSON.stringify(cart))

updateCart()

alert("Added to cart")

}

function updateCart(){

let total=0

cart.forEach(p=> total+=p.qty)

document.getElementById("cartCount").innerText=total

}

function loadProducts(){

let box=document.getElementById("products")

box.innerHTML=""

products.forEach(p=>{

box.innerHTML+=`

<div class="product">

<img src="${p.image}">

<h4>${p.name}</h4>

<div class="rating">${stars(p.rating)}</div>

<p class="price">₦${p.price}</p>

<button class="add" onclick="addCart('${p.name}',${p.price},'${p.image}')">
Add to Cart
</button>

</div>

`

})

}

function openWhatsApp(){

window.open("https://wa.me/2348032390904")

}

loadProducts()

updateCart()

</script>

</body>
</html>
