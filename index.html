<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blevic Superstore</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://i.postimg.cc/y8MPbn3x/file-00000000c9d07246a98b3cee735de787.png");
background-size:cover;
background-position:center;
color:white;
}

.header{

background:#ff9900;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;

}

.username{

text-align:center;
margin-top:10px;
font-size:18px;

}

.menu{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:20px;

}

.menu button{

padding:15px;
font-size:16px;
border:none;
background:#ff9900;
color:white;
border-radius:8px;

}

.games{

position:fixed;
bottom:20px;
right:20px;
background:#ff9900;
padding:15px;
border-radius:50%;
font-size:20px;

}

.customer{

position:fixed;
bottom:20px;
left:20px;
background:#ff9900;
padding:15px;
border-radius:50%;
font-size:20px;

}

</style>

</head>

<body>

<div class="header">
🏪 Blevic Superstore
</div>

<div id="username" class="username"></div>

<div class="menu">

<button onclick="openPage('product.html')">
🛒 Products
</button>

<button onclick="openPage('cart.html')">
🧾 Cart
</button>

<button onclick="openPage('login.html')">
🔑 Login
</button>

<button onclick="openPage('signup.html')">
📝 Sign Up
</button>

<button onclick="openPage('spin.html')">
🎰 Spin & Win
</button>

<button onclick="openPage('daily.html')">
🎁 Daily Reward
</button>

</div>

<div class="games" onclick="openPage('game.html')">
🎮
</div>

<div class="customer" onclick="openPage('chat.html')">
💬
</div>

<script>

function openPage(page){

window.location.href = page

}

let user = localStorage.getItem("username")

if(user){

document.getElementById("username").innerHTML =
"Welcome "+user

}

</script>

</body>

</html>
