<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blevic Superstore</title>
<style>
html, body {margin:0; padding:0; height:100%; font-family:Arial; overflow-x:hidden;}
body {
  background: url('https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png') no-repeat center center fixed;
  background-size: cover;
  color:white;
  text-shadow: 2px 2px 5px #000;
}

/* WELCOME MESSAGE */
#welcome { text-align:center; font-size:22px; font-weight:bold; margin-top:20px; }

/* MAIN BUTTONS */
.main-buttons { display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:40px; }
.main-buttons button {
  padding:15px 25px; font-size:18px; border:none; border-radius:10px; background: rgba(255,105,0,0.8); color:white; cursor:pointer; font-weight:bold;
}
.main-buttons button:hover { background: rgba(255,140,51,0.9); }

/* FLOATING BUTTONS */
.floating { position: fixed; bottom:20px; right:20px; background:#ff9900; color:white; padding:18px; border-radius:50%; font-size:24px; cursor:pointer; box-shadow:0 5px 12px rgba(0,0,0,0.3); }
.floating-customer { position: fixed; bottom:20px; right:90px; background:#0288d1; color:white; padding:18px; border-radius:50%; font-size:24px; cursor:pointer; box-shadow:0 5px 12px rgba(0,0,0,0.3); }

/* CART PREVIEW POPUP */
#cart-preview {
  position: fixed; top:20px; right:20px; background:rgba(0,0,0,0.8); padding:15px; border-radius:10px; display:none; max-width:250px;
}
#cart-preview h4{ margin:0 0 10px 0; text-align:center; }
.cart-item{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.cart-item img{ width:40px; border-radius:5px; }
.cart-item button{ background:red; color:white; border:none; border-radius:4px; cursor:pointer; padding:2px 5px; font-size:12px; }
#checkout, #paid { width:100%; padding:8px; margin-top:5px; border:none; border-radius:5px; cursor:pointer; font-weight:bold; }
#checkout{ background:#ff6a00; color:white; }
#paid{ background:#28a745; color:white; }

</style>
</head>
<body>

<div id="welcome"></div>

<div class="main-buttons">
  <button onclick="goProducts()">🛍 Products</button>
  <button onclick="toggleCart()">🛒 Cart <span id="cart-count">0</span></button>
  <button onclick="goLogin()">🔑 Login / Signup</button>
  <button onclick="goTracking()">📦 Track Order</button>
</div>

<div class="floating" onclick="goGames()">🎮</div>
<div class="floating-customer" onclick="goCustomerCare()">💬</div>

<!-- CART PREVIEW -->
<div id="cart-preview">
  <h4>Your Cart</h4>
  <div id="cart-items"></div>
  <button id="checkout">Checkout</button>
  <button id="paid">I Have Paid</button>
</div>

<script>
// Show username if logged in
let username = localStorage.getItem("username");
if(username){
  document.getElementById("welcome").innerText = "Hi "+username+" 👋 Welcome to Blevic Superstore";
}

// Cart functions
let cart = JSON.parse(localStorage.getItem("cart"))||[];
const cartCount = document.getElementById("cart-count");
const cartPreview = document.getElementById("cart-preview");
const cartItemsDiv = document.getElementById("cart-items");

function updateCartCounter(){
  cartCount.innerText = cart.length;
}

function renderCartPreview(){
  cartItemsDiv.innerHTML="";
  if(cart.length===0){
    cartItemsDiv.innerHTML="<p>Your cart is empty!</p>";
    return;
  }
  cart.forEach((item,index)=>{
    let div = document.createElement("div");
    div.className="cart-item";
    div.innerHTML = `<img src="${item.image}"><span>${item.name} ₦${item.price}</span><button onclick="removeItem(${index})">x</button>`;
    cartItemsDiv.appendChild(div);
  });
}

function toggleCart(){
  if(cartPreview.style.display==="none" || cartPreview.style.display===""){
    cartPreview.style.display="block";
    renderCartPreview();
  }else{
    cartPreview.style.display="none";
  }
}

function removeItem(index){
  cart.splice(index,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCartCounter();
  renderCartPreview();
}

// Checkout button
document.getElementById("checkout").onclick=function(){
  if(cart.length===0){ alert("Cart is empty!"); return; }
  alert("Checkout simulated. You can now click 'I Have Paid'.");
}

// I Have Paid button
document.getElementById("paid").onclick=function(){
  if(cart.length===0){ alert("Cart is empty!"); return; }
  let orderCode = "BLEVIC"+Math.floor(Math.random()*90000+10000);
  localStorage.setItem("lastOrderCode",orderCode);
  alert("Payment confirmed! Your order code: "+orderCode);
  cart = [];
  localStorage.removeItem("cart");
  updateCartCounter();
  renderCartPreview();
}

// Navigation functions
function goProducts(){ window.location.href="products.html"; }
function goLogin(){ window.location.href="login.html"; }
function goGames(){ window.location.href="games.html"; }
function goCustomerCare(){ window.location.href="chat.html"; }
function goTracking(){ window.location.href="tracking.html"; } // <-- Track Order button

updateCartCounter();
</script>
</body>
</html>
