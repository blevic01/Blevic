<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blevic Superstore</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

/* HEADER */

.header{
background:#ff6600;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.cart{
font-size:22px;
cursor:pointer;
}

.cart span{
background:red;
border-radius:50%;
padding:2px 6px;
font-size:14px;
}

/* SLIDER */

.slider{
width:100%;
height:180px;
overflow:hidden;
}

.slider img{
width:100%;
height:180px;
object-fit:cover;
}

/* BUTTONS */

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.menu button{
padding:15px;
border:none;
background:white;
border-radius:8px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
font-size:16px;
cursor:pointer;
}

/* DAILY REWARD */

.reward{
background:white;
margin:10px;
padding:15px;
border-radius:8px;
text-align:center;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div id="welcome">Welcome</div>

<div class="cart" onclick="openCart()">
🛒 <span id="cartCount">0</span>
</div>

</div>

<!-- AUTO SLIDER -->

<div class="slider">

<img id="slide" src="https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png">

</div>

<!-- MAIN BUTTONS -->

<div class="menu">

<button onclick="location.href='products.html'">🛍 Products</button>

<button onclick="location.href='cart.html'">🛒 Cart</button>

<button onclick="location.href='tracking.html'">📦 Track Order</button>

<button onclick="location.href='games.html'">🎮 Games</button>

</div>

<!-- DAILY REWARD -->

<div class="reward">

<h3>Daily Reward</h3>

<p id="rewardText">Click to claim reward</p>

<button onclick="claimReward()">Claim Reward</button>

</div>

<script>

/* AUTO SLIDER */

let images=[
"https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png",
"https://i.postimg.cc/QMdXHJnZ/file-00000000c9d07246a98b3cee735de787.png"
]

let i=0;

setInterval(()=>{

i++

if(i>=images.length) i=0

document.getElementById("slide").src=images[i]

},3000)

/* CART COUNTER */

let cart=JSON.parse(localStorage.getItem("cart"))||[]

let total=0

cart.forEach(p=> total+=p.qty)

document.getElementById("cartCount").innerText=total

/* LOGIN SYSTEM */

let user=localStorage.getItem("username")

if(!user){

user=prompt("Enter your name")

localStorage.setItem("username",user)

}

document.getElementById("welcome").innerText="Hi "+user

/* DAILY REWARD */

function claimReward(){

let today=new Date().toDateString()

let last=localStorage.getItem("rewardDate")

if(today==last){

alert("You already claimed today")

return

}

localStorage.setItem("rewardDate",today)

alert("You received 10 coins!")

document.getElementById("rewardText").innerText="Reward claimed today"

}

</script>

</body>
</html>
