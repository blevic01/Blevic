
<!DOCTYPE html>

<title>Blessings Superstore</title>

<style>

/* Makes image fit phone */

background-position:center;

}

/* Dark overlay */
.overlay{
background:rgba(0,0,0,0.5);
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

button{
padding:10px 18px;
margin:6px;
border:none;
border-radius:6px;
font-size:16px;
background:#ff6600;
color:white;
cursor:pointer;
}

button:hover{

}

</style>
