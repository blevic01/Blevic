<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blevic Superstore</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#ff9900;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.welcome{
text-align:center;
margin-top:10px;
font-size:18px;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
padding:20px;
}

.menu button{
padding:15px;
border:none;
border-radius:8px;
background:#ff9900;
color:white;
font-size:16px;
width:140px;
}

.floating{
position:fixed;
bottom:20px;
right:20px;
background:#ff9900;
color:white;
padding:18px;
border-radius:50%;
font-size:22px;
}

.floating2{
position:fixed;
bottom:20px;
right:90px;
background:#ff9900;
color:white;
padding:18px;
border-radius:50%;
font-size:22px;
}

</style>

</head>

<body>

<header>
Blevic Superstore
</header>

<div class="welcome" id="welcome"></div>

<div class="menu">

<button onclick="location.href='product.html'">Products</button>

<button onclick="location.href='cart.html'">Cart</button>

<button onclick="location.href='tracking.html'">Track Order</button>

<button onclick="location.href='login.html'">Login</button>

<button onclick="location.href='signup.html'">Signup</button>

<button onclick="logout()">Logout</button>

</div>

<div class="floating" onclick="location.href='games.html'">🎮</div>

<div class="floating2" onclick="location.href='chat.html'">💬</div>

<script>

let name=localStorage.getItem("userName")

if(name){
document.getElementById("welcome").innerHTML="Welcome "+name
}

function logout(){

localStorage.removeItem("userName")

alert("Logged out")

location.reload()

}

</script>

</body>
</html>
