
<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blevic Superstore</title>

<style>

body{
margin:0;
font-family:Arial;
background-image:url("https://i.postimg.cc/y8MPbn3x/file-00000000c9d07246a98b3cee735de787.png");
background-size:cover;
background-position:center;
}

/* TOP BAR */

.header{
background:#ff9900;
padding:12px;
color:white;
font-size:20px;
text-align:center;
font-weight:bold;
}

/* NAVIGATION LIKE JUMIA */

.nav{
display:flex;
justify-content:space-around;
background:white;
padding:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.nav button{
border:none;
background:none;
font-size:14px;
font-weight:bold;
}

/* FLOATING BUTTONS */

.floating{
position:fixed;
right:20px;
width:55px;
height:55px;
border-radius:50%;
border:none;
font-size:22px;
color:white;
cursor:pointer;
}

.games{
bottom:90px;
background:#ff6600;
}

.chat{
bottom:20px;
background:#28a745;
}

</style>

</head>

<body>

<div class="header">
Blevic Superstore
</div>

<div class="nav">

<button onclick="location.href='product.html'">Products</button>

<button onclick="location.href='cart.html'">Cart</button>

<button onclick="location.href='login.html'">Login</button>

<button onclick="location.href='signup.html'">Sign Up</button>

<button onclick="location.href='account.html'">Account</button>

</div>

<!-- FLOATING BUTTONS -->

<button class="floating games" onclick="location.href='games.html'">
🎮
</button>

<button class="floating chat" onclick="location.href='chat.html'">
💬
</button>

</body>
</html>
