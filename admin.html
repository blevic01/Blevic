<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Blevic Superstore Admin</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h2{
color:#ff6600;
}

input{
width:95%;
padding:10px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
background:#ff6600;
color:white;
border-radius:5px;
margin:3px;
cursor:pointer;
}

.product{
background:white;
padding:10px;
margin-top:10px;
border-radius:8px;
}

img{
width:60px;
height:60px;
object-fit:cover;
border-radius:5px;
}

</style>
</head>

<body>

<h2>Blevic Superstore Admin</h2>

<h3>Add Product</h3>

<input id="name" placeholder="Product Name">

<input id="price" placeholder="Price">

<input id="image" placeholder="Image URL">

<input id="rating" placeholder="Rating (1-5)">

<button onclick="addProduct()">Add Product</button>

<hr>

<h3>Products</h3>

<div id="productList"></div>


<script>

let products = JSON.parse(localStorage.getItem("products")) || []


function saveProducts(){
localStorage.setItem("products",JSON.stringify(products))
}


function addProduct(){

let name=document.getElementById("name").value
let price=document.getElementById("price").value
let image=document.getElementById("image").value
let rating=document.getElementById("rating").value

products.push({
name:name,
price:price,
image:image,
rating:rating
})

saveProducts()
showProducts()

alert("Product added")

}


function deleteProduct(index){

products.splice(index,1)

saveProducts()

showProducts()

}


function editProduct(index){

let p=products[index]

let newName=prompt("Edit name",p.name)
let newPrice=prompt("Edit price",p.price)
let newImage=prompt("Edit image URL",p.image)
let newRating=prompt("Edit rating (1-5)",p.rating)

products[index]={
name:newName,
price:newPrice,
image:newImage,
rating:newRating
}

saveProducts()
showProducts()

}


function showProducts(){

let box=document.getElementById("productList")

box.innerHTML=""

products.forEach((p,i)=>{

box.innerHTML+=`

<div class="product">

<img src="${p.image}">

<b>${p.name}</b><br>

₦${p.price}<br>

Rating: ${p.rating} ⭐<br>

<button onclick="editProduct(${i})">
Edit
</button>

<button onclick="deleteProduct(${i})">
Delete
</button>

</div>

`

})

}

showProducts()

</script>

</body>
</html>
