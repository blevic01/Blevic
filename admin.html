<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blevic Admin</title>

<style>
body{font-family:Arial;background:#f2f2f2;padding:20px;}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:6px;}
button{padding:8px;background:#ff6600;color:white;border:none;border-radius:6px;}
.product{background:white;padding:10px;margin-top:10px;border-radius:8px;}
</style>
</head>

<body>

<h2>Admin Dashboard</h2>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="image" placeholder="Image URL">

<select id="rating">
<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>
</select>

<button onclick="addProduct()">Add Product</button>

<h3>Products</h3>
<div id="adminProducts"></div>

<script>

let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
localStorage.setItem("products",JSON.stringify(products));
loadProducts();
}

function addProduct(){

let p={
name:name.value,
price:price.value,
image:image.value,
rating:rating.value
};

products.push(p);
save();
}

function deleteProduct(i){
products.splice(i,1);
save();
}

function editProduct(i){

let p=products[i];

name.value=p.name;
price.value=p.price;
image.value=p.image;
rating.value=p.rating;

products.splice(i,1);
save();
}

function loadProducts(){

let box=document.getElementById("adminProducts");
box.innerHTML="";

products.forEach((p,i)=>{

box.innerHTML+=`
<div class="product">
${p.name} - ₦${p.price}

<br>

<button onclick="editProduct(${i})">Edit</button>
<button onclick="deleteProduct(${i})">Delete</button>

</div>
`;

});

}

loadProducts();

</script>

</body>
</html>
