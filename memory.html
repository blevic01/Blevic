<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Game</title>

<style>

body{
text-align:center;
font-family:Arial;
}

.grid{
display:grid;
grid-template-columns:repeat(4,70px);
gap:10px;
justify-content:center;
}

.card{
width:70px;
height:70px;
background:orange;
font-size:30px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
}

</style>

</head>

<body>

<h2>Memory Game</h2>

<div class="grid" id="grid"></div>

<script>

let icons=["🍎","🍌","🍇","🍓","🍎","🍌","🍇","🍓"]

icons.sort(()=>0.5-Math.random())

let first=null

icons.forEach(icon=>{

let div=document.createElement("div")

div.className="card"

div.onclick=function(){

div.innerText=icon

if(first==null){

first=div

}else{

if(first.innerText!=div.innerText){

setTimeout(()=>{

first.innerText=""
div.innerText=""

},500)

}

first=null

}

}

document.getElementById("grid").appendChild(div)

})

</script>

</body>
</html>
