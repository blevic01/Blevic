<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

.header{
background:#ff9900;
color:white;
padding:12px;
font-weight:bold;
}

.box{
background:white;
margin:20px;
padding:20px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

button{
padding:10px;
background:#28a745;
border:none;
color:white;
}

</style>

</head>

<body>

<div class="header">
Blevic Superstore Cart
</div>

<div class="box">

<h3 id="product"></h3>

<p id="price"></p>

<button onclick="location.href='payment.html'">
Proceed to Payment
</button>

</div>

<script>

document.getElementById("product").innerText =
localStorage.getItem("productName")

document.getElementById("price").innerText =
"₦"+localStorage.getItem("productPrice")

</script>

</body>
</html>
