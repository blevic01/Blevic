<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cart</title>
</head>

<body>

<h2>Your Cart</h2>

<div id="cart"></div>

<script>

let cart=JSON.parse(localStorage.getItem("cart")) || []

let html=""

let total=0

cart.forEach(p=>{

html+="<p>"+p.name+" - ₦"+p.price+"</p>"

total+=p.price

})

html+="<h3>Total ₦"+total+"</h3>"

document.getElementById("cart").innerHTML=html

</script>

</body>

</html>
