<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Your Cart</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.header{
background:#ff6600;
color:white;
padding:12px;
text-align:center;
}

.item{
background:white;
margin:10px;
padding:10px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
}

.controls button{
padding:6px 10px;
border:none;
background:#ff6600;
color:white;
border-radius:4px;
}

.checkout{
margin:20px;
padding:12px;
width:90%;
background:#28a745;
color:white;
border:none;
border-radius:6px;
font-size:16px;
}

</style>
</head>

<body>

<div class="header">
<h2>Your Cart</h2>
</div>

<div id="cartItems"></div>

<center>
<button class="checkout" onclick="checkout()">Checkout</button>
</center>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || []

function loadCart(){

let box=document.getElementById("cartItems")

box.innerHTML=""

cart.forEach((p,i)=>{

box.innerHTML+=`

<div class="item">

<div>

<b>${p.name}</b><br>
₦${p.price}

</div>

<div class="controls">

<button onclick="changeQty(${i},-1)">−</button>

${p.qty}

<button onclick="changeQty(${i},1)">+</button>

</div>

</div>

`

})

}

function changeQty(i,n){

cart[i].qty += n

if(cart[i].qty<=0){

cart.splice(i,1)

}

localStorage.setItem("cart",JSON.stringify(cart))

loadCart()

}

function checkout(){

if(cart.length==0){

alert("Cart is empty")

return

}

let code="BLEVIC"+Math.floor(Math.random()*100000)

localStorage.setItem("orderCode",code)

alert("Order placed!\nYour code: "+code)

localStorage.removeItem("cart")

window.location="tracking.html"

}

loadCart()

</script>

</body>
</html>
