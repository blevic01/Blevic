<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Cart</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

h2{
text-align:center;
}

.cart{
padding:10px;
}

.item{
background:white;
padding:10px;
margin-bottom:10px;
border-radius:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.item img{
width:60px;
border-radius:6px;
}

.qty button{
padding:5px;
}

.checkout{
background:green;
color:white;
padding:10px;
border:none;
width:100%;
border-radius:6px;
font-size:18px;
}

</style>
</head>

<body>

<h2>Your Cart</h2>

<div class="cart" id="cart"></div>

<button class="checkout">Checkout</button>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function loadCart(){

let container=document.getElementById("cart");
container.innerHTML="";

if(cart.length==0){
container.innerHTML="<p>Cart is empty</p>";
return;
}

cart.forEach((item,index)=>{

let div=document.createElement("div");
div.className="item";

div.innerHTML=`

<img src="${item.image}">
<div>
<b>${item.name}</b><br>
₦${item.price}
</div>

<div class="qty">

<button onclick="changeQty(${index},-1)">-</button>

${item.qty}

<button onclick="changeQty(${index},1)">+</button>

</div>

`;

container.appendChild(div);

});

}

function changeQty(i,change){

cart[i].qty+=change;

if(cart[i].qty<=0){
cart.splice(i,1);
}

localStorage.setItem("cart",JSON.stringify(cart));

loadCart();

}

loadCart();

</script>

</body>
</html>
