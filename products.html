<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

.header{
background:#ff9900;
color:white;
padding:12px;
text-align:center;
font-weight:bold;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.card{
background:white;
margin:10px;
padding:10px;
width:160px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
text-align:center;
}

.card img{
width:100%;
}

button{
background:#ff6600;
border:none;
padding:8px;
color:white;
margin-top:5px;
}

</style>

</head>

<body>

<div class="header">
Blevic Superstore Products
</div>

<div class="products">

<div class="card">

<img src="https://i.postimg.cc/y8MPbn3x/file-00000000c9d07246a98b3cee735de787.png">

<h4>Eva Soap Pack</h4>

<p>₦500</p>

<button onclick="addToCart('Eva Soap Pack',500)">
Add to Cart
</button>

</div>

</div>

<script>

function addToCart(name,price){

localStorage.setItem("productName",name)
localStorage.setItem("productPrice",price)

window.location.href="cart.html"

}

</script>

</body>
</html>
