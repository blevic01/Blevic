<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blevic Superstore Payment</title>

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
margin:0;
}

.header{
background:#ff9900;
padding:15px;
font-size:20px;
font-weight:bold;
}

.box{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

button{
padding:12px;
margin:10px;
border:none;
background:#ff9900;
color:white;
width:80%;
}

</style>

</head>

<body>

<div class="header">
💳 Payment
</div>

<div class="box">

<h3>Total Amount</h3>

<h2>₦<span id="amount"></span></h2>

</div>

<div class="box">

<h3>Select Payment Method</h3>

<button onclick="paystackPay()">Pay with Paystack</button>

<button onclick="showTransfer()">Pay with Bank Transfer</button>

</div>

<div class="box" id="transferBox" style="display:none">

<h3>Bank Transfer</h3>

<p><b>Bank:</b> Opay</p>

<p><b>Account Number:</b> 7081121045</p>

<p>After transfer, click the button below</p>

<button onclick="confirmTransfer()">I Have Made The Transfer</button>

</div>

<script>

let total = localStorage.getItem("totalPayment") || 0

document.getElementById("amount").innerText = total

function paystackPay(){

let handler = PaystackPop.setup({

key: "YOUR_PAYSTACK_PUBLIC_KEY",

email: "customer@email.com",

amount: total * 100,

currency: "NGN",

callback: function(){

alert("Payment Successful")

window.location.href="tracking.html"

}

})

handler.openIframe()

}

function showTransfer(){

document.getElementById("transferBox").style.display="block"

}

function confirmTransfer(){

let cart = JSON.parse(localStorage.getItem("cart")) || []

let message = "Hello, I have made a transfer for my order:%0A%0A"

cart.forEach(item=>{

message += item.name + " - ₦" + item.price + "%0A"

})

message += "%0ATotal: ₦"+total

window.open("https://wa.me/2348032390904?text="+message)

}

</script>

</body>

</html>
