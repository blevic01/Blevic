<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blevic Game Center</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

.header{
background:#ff9900;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.container{

display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;

}

.game-card{

background:#1c1c1c;
border-radius:10px;
padding:15px;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,0.5);

}

.game-card h3{

margin-top:5px;

}

.game-card button{

margin-top:10px;
padding:10px;
background:#ff9900;
border:none;
color:white;
border-radius:6px;
width:100%;

}

.home{

position:fixed;
bottom:20px;
left:20px;
background:#ff9900;
padding:12px;
border-radius:50%;
font-size:18px;

}

</style>

</head>

<body>

<div class="header">
🎮 Blevic Superstore Game Center
</div>

<div class="container">

<div class="game-card">
<h3>🐍 Snake Game</h3>
<button onclick="openGame('snake.html')">Play</button>
</div>

<div class="game-card">
<h3>❌⭕ X & O</h3>
<button onclick="openGame('xo.html')">Play</button>
</div>

<div class="game-card">
<h3>🔫 Bottle Shooting</h3>
<button onclick="openGame('shooting.html')">Play</button>
</div>

<div class="game-card">
<h3>🟢 Squid Game</h3>
<button onclick="openGame('squid.html')">Play</button>
</div>

<div class="game-card">
<h3>🎲 Guess Number</h3>
<button onclick="openGame('guess.html')">Play</button>
</div>

<div class="game-card">
<h3>🧠 Memory Game</h3>
<button onclick="openGame('memory.html')">Play</button>
</div>

<div class="game-card">
<h3>⚡ Click Speed</h3>
<button onclick="openGame('click.html')">Play</button>
</div>

<div class="game-card">
<h3>🎨 Color Match</h3>
<button onclick="openGame('color.html')">Play</button>
</div>

<div class="game-card">
<h3>🧩 Puzzle Game</h3>
<button onclick="openGame('puzzle.html')">Play</button>
</div>

<div class="game-card">
<h3>🎰 Spin & Win</h3>
<button onclick="openGame('spin.html')">Play</button>
</div>

<div class="game-card">
<h3>🎁 Daily Reward</h3>
<button onclick="openGame('daily.html')">Open</button>
</div>

<div class="game-card">
<h3>🏆 Leaderboard</h3>
<button onclick="openGame('leaderboard.html')">View</button>
</div>

</div>

<a href="index.html">
<div class="home">🏠</div>
</a>

<script>

function openGame(game){

window.location.href = game

}

</script>

</body>
</html>
