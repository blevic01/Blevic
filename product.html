<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Products</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.product{
background:white;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 5px gray;
}

button{
background:#ff9900;
border:none;
padding:10px;
color:white;
border-radius:5px;
}

</style>

</head>

<body>

<h2 style="text-align:center">Products</h2>

<div class="product">

<h3>Eva Soap</h3>

<p>₦1200</p>

<button onclick="addCart('Eva Soap',1200)">Add to Cart</button>

</div>

<div class="product">

<h3>Milo</h3>

<p>₦2500</p>

<button onclick="addCart('Milo',2500)">Add to Cart</button>

</div>

<script>

function addCart(name,price){

let cart=JSON.parse(localStorage.getItem("cart")) || []

cart.push({name,price})

localStorage.setItem("cart",JSON.stringify(cart))

alert("Added to cart")

}

</script>

</body>
</html>
