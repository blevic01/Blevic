<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blevic Superstore Products</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}
.header{
background:#ff9900;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
}
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}
.product{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}
.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}
button{
padding:10px;
margin-top:10px;
width:90%;
border:none;
border-radius:8px;
background:#ff9900;
color:white;
font-weight:bold;
cursor:pointer;
}
.cart{
position:fixed;
bottom:20px;
right:20px;
background:#ff9900;
padding:15px;
border-radius:50%;
font-size:20px;
color:white;
text-align:center;
cursor:pointer;
}
.rating{
margin-top:5px;
}
.rating span{
cursor:pointer;
font-size:20px;
color:gray;
}
.rating span.selected{
color:gold;
}
</style>
</head>
<body>

<div class="header">🛒 Blevic Superstore</div>

<div class="products"></div>

<div class="cart" onclick="openCart()">🛒</div>

<script>
// Load products from admin
let products = JSON.parse(localStorage.getItem("products")) || []

let container = document.querySelector(".products")
container.innerHTML = ""

// Display products
products.forEach((p,index)=>{
container.innerHTML += `
<div class="product">
<img src="${p.img}" alt="${p.name}" onclick="showDetails(${index})">
<h3>${p.name}</h3>
<p>₦${p.price}</p>

<div class="rating" id="rating${index}">
<span onclick="rateProduct(${index},1)">★</span>
<span onclick="rateProduct(${index},2)">★</span>
<span onclick="rateProduct(${index},3)">★</span>
<span onclick="rateProduct(${index},4)">★</span>
<span onclick="rateProduct(${index},5)">★</span>
</div>

<button onclick="addToCart('${p.name}',${p.price})">Add To Cart</button>
<button onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
</div>
`
})

// Rating system
function rateProduct(index,value){
let r = document.getElementById("rating"+index).children
for(let i=0;i<5;i++){
if(i<value) r[i].classList.add("selected")
else r[i].classList.remove("selected")
}
alert("You rated "+products[index].name+" "+value+" stars!")
}

// Add to cart
function addToCart(name,price){
let cart = JSON.parse(localStorage.getItem("cart")) || []
cart.push({name:name, price:price})
localStorage.setItem("cart", JSON.stringify(cart))
alert(name+" added to cart!")
}

// Open cart
function openCart(){
window.location.href = "cart.html"
}

// Buy now button
function buyNow(name,price){
let choice = confirm("Do you want to pay via Paystack? Press Cancel for Bank Transfer")
localStorage.setItem("totalPayment", price)
localStorage.setItem("cart", JSON.stringify([{name:name, price:price}]))
if(choice){
window.location.href = "payment.html" // paystack payment page
}else{
window.location.href = "payment.html" // same page handles transfer
}
}

// Show full product details
function showDetails(index){
let p = products[index]
alert(`Product: ${p.name}\nPrice: ₦${p.price}\nImage URL: ${p.img}`)
}
</script>

</body>
</html>
