<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blevic Superstore Products</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:0;
}
.header{
background:#ff9900;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:white;
}
.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
padding:15px;
}
.product{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.3);
}
.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}
button{
padding:10px;
margin-top:10px;
width:90%;
border:none;
border-radius:8px;
background:#ff9900;
color:white;
font-weight:bold;
cursor:pointer;
}
.cart{
position:fixed;
bottom:20px;
right:20px;
background:#ff9900;
padding:15px;
border-radius:50%;
font-size:20px;
color:white;
text-align:center;
cursor:pointer;
}
</style>
</head>
<body>

<div class="header">🛒 Blevic Superstore</div>

<div class="products"></div>

<div class="cart" onclick="openCart()">🛒</div>

<script>

// Load products from admin
let products = JSON.parse(localStorage.getItem("products")) || []

let container = document.querySelector(".products")
container.innerHTML = ""

// Display all products
products.forEach(p=>{
container.innerHTML += `
<div class="product">
<img src="${p.img}" alt="${p.name}">
<h3>${p.name}</h3>
<p>₦${p.price}</p>
<button onclick="addToCart('${p.name}',${p.price})">Add To Cart</button>
</div>
`
})

// Add to cart function
function addToCart(name,price){
let cart = JSON.parse(localStorage.getItem("cart")) || []
cart.push({name:name, price:price})
localStorage.setItem("cart", JSON.stringify(cart))
alert(name+" added to cart!")
}

// Open cart page
function openCart(){
window.location.href = "cart.html"
}

</script>

</body>
</html>
