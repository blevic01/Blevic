<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blevic Superstore Products</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

h2{
text-align:center;
padding:15px;
}

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:10px;
}

.product{
background:white;
border-radius:10px;
padding:10px;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
text-align:center;
}

.product img{
width:100%;
height:140px;
object-fit:cover;
border-radius:8px;
}

.price{
color:#ff6600;
font-weight:bold;
}

.rating{
color:gold;
font-size:18px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:8px 12px;
border-radius:6px;
cursor:pointer;
margin-top:5px;
}

</style>
</head>

<body>

<h2>Blevic Superstore Products</h2>

<div class="products">

<div class="product">
<img src="https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png">
<h3>Eva Soap</h3>
<div class="price">₦700</div>
<div class="rating">⭐⭐⭐⭐☆</div>
<button onclick="addToCart('Eva Soap',700,'https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png')">Add to Cart</button>
</div>

<div class="product">
<img src="https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png">
<h3>Lux Soap</h3>
<div class="price">₦800</div>
<div class="rating">⭐⭐⭐⭐⭐</div>
<button onclick="addToCart('Lux Soap',800,'https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png')">Add to Cart</button>
</div>

</div>

<script>

function addToCart(name,price,image){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let product = cart.find(p=>p.name===name);

if(product){
product.qty +=1;
}else{
cart.push({name:name,price:price,image:image,qty:1});
}

localStorage.setItem("cart",JSON.stringify(cart));

alert("Product added to cart");

}

</script>

</body>
</html>
