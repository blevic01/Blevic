<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Blevic Superstore - Products</title>
<style>
body{font-family:Arial;margin:0;padding:0;background:#f5f5f5;}
h2{text-align:center;margin:20px 0;color:#ff6a00;}
.products-container{display:grid; grid-template-columns:repeat(2,1fr); gap:15px; padding:10px;}
.product-card{background:white; border-radius:10px; padding:10px; text-align:center; box-shadow:0 3px 8px rgba(0,0,0,0.2);}
.product-card img{width:100%; height:150px; object-fit:cover; border-radius:8px;}
.product-name{font-weight:bold;margin:8px 0;}
.product-price{color:#ff6a00;font-weight:bold;margin:5px 0;}
.rating{color:gold;}
.product-buttons{display:flex; justify-content:center; gap:5px; margin-top:8px;}
.product-buttons button{padding:6px 10px; border:none; border-radius:5px; cursor:pointer; background:#ff6a00; color:white; font-weight:bold;}
.quantity-control{display:flex; justify-content:center; gap:5px; align-items:center; margin-top:5px;}
.quantity-control button{padding:4px 8px; border:none; border-radius:5px; background:#0288d1; color:white; cursor:pointer;}
</style>
</head>
<body>

<h2>Products</h2>
<div class="products-container" id="products-container"></div>

<script>
// Sample products
let products = [
  {name:"Eva Soap Pack", price:700, image:"https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png", rating:4},
  {name:"Dove Shampoo", price:1200, image:"https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png", rating:5},
  {name:"Lux Soap Pack", price:800, image:"https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png", rating:3},
  {name:"Hand Sanitizer", price:500, image:"https://i.postimg.cc/2S5JW9m7/file-00000000ec44724686c377d13d0f8765.png", rating:4}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderProducts(){
  const container = document.getElementById("products-container");
  container.innerHTML="";
  products.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className="product-card";
    let stars="";
    for(let s=0;s<5;s++){ stars+= s<p.rating ? "★":"☆"; }
    div.innerHTML = `
      <img src="${p.image}" alt="${p.name}">
      <div class="product-name">${p.name}</div>
      <div class="product-price">₦${p.price}</div>
      <div class="rating">${stars}</div>
      <div class="quantity-control">
        <button onclick="decreaseQuantity(${i})">-</button>
        <span id="qty-${i}">${getQuantity(i)}</span>
        <button onclick="increaseQuantity(${i})">+</button>
      </div>
      <div class="product-buttons">
        <button onclick="addToCart(${i})">Buy Now</button>
      </div>
    `;
    container.appendChild(div);
  });
}

// Quantity functions
function getQuantity(index){
  let item = cart.find(c=>c.index===index);
  return item ? item.qty : 0;
}

function increaseQuantity(index){
  let item = cart.find(c=>c.index===index);
  if(item){ item.qty++; }else{ cart.push({index:index, qty:1}); }
  localStorage.setItem("cart",JSON.stringify(cart));
  document.getElementById("qty-"+index).innerText = getQuantity(index);
}

function decreaseQuantity(index){
  let item = cart.find(c=>c.index===index);
  if(item){
    item.qty--;
    if(item.qty<=0){ cart = cart.filter(c=>c.index!==index); }
    localStorage.setItem("cart",JSON.stringify(cart));
    document.getElementById("qty-"+index).innerText = getQuantity(index);
  }
}

// Add to cart directly
function addToCart(index){
  increaseQuantity(index);
  alert(products[index].name + " added to cart!");
}

renderProducts();
</script>
</body>
</html>
