<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X & O Game - Blessings Superstore</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    text-align: center;
    margin: 0;
    padding: 20px;
  }
  h1 {
    color: #ff6600;
  }
  #mode-selection, #difficulty-selection {
    margin: 10px 0;
  }
  button {
    background: #ff6600;
    color: white;
    border: none;
    padding: 10px 15px;
    margin: 5px;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover {
    background: #e65c00;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(3, 80px);
    grid-template-rows: repeat(3, 80px);
    gap: 5px;
    justify-content: center;
    margin-top: 20px;
  }
  .cell {
    background: white;
    border: 2px solid #ff6600;
    font-size: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .back-home {
    display: block;
    margin-top: 20px;
    text-decoration: none;
    color: #ff6600;
    font-weight: bold;
  }
</style>
</head>
<body>
<h1>X & O Game</h1>

<!-- Mode selection -->
<div id="mode-selection">
  <button onclick="selectMode('2p')">Two Player</button>
  <button onclick="selectMode('computer')">Play vs Computer</button>
</div>

<!-- Difficulty selection (visible only if computer mode) -->
<div id="difficulty-selection" style="display:none;">
  <p>Select Difficulty:</p>
  <button onclick="selectDifficulty('super-easy')">Super Easy</button>
  <button onclick="selectDifficulty('easy')">Easy</button>
  <button onclick="selectDifficulty('medium')">Medium</button>
  <button onclick="selectDifficulty('hard')">Hard</button>
  <button onclick="selectDifficulty('extra-hard')">Extra Hard</button>
  <button onclick="selectDifficulty('extreme-hard')">Extreme Hard</button>
</div>

<div id="board"></div>

<a href="index.html" class="back-home">← Back to Home</a>

<script>
let board = ['', '', '', '', '', '', '', '', ''];
let currentPlayer = 'X';
let mode = ''; // '2p' or 'computer'
let difficulty = '';

function selectMode(selectedMode) {
  mode = selectedMode;
  if (mode === 'computer') {
    document.getElementById('difficulty-selection').style.display = 'block';
  } else {
    document.getElementById('difficulty-selection').style.display = 'none';
    startGame();
  }
}

function selectDifficulty(level) {
  difficulty = level;
  startGame();
}

function startGame() {
  board = ['', '', '', '', '', '', '', '', ''];
  currentPlayer = 'X';
  renderBoard();
}

function renderBoard() {
  const boardDiv = document.getElementById('board');
  boardDiv.innerHTML = '';
  board.forEach((cell, index) => {
    const cellDiv = document.createElement('div');
    cellDiv.classList.add('cell');
    cellDiv.textContent = cell;
    cellDiv.addEventListener('click', () => makeMove(index));
    boardDiv.appendChild(cellDiv);
  });
}

function makeMove(index) {
  if (board[index] !== '') return;
  if (mode === '2p') {
    board[index] = currentPlayer;
    if (checkWin(currentPlayer)) {
      alert(currentPlayer + ' wins!');
      startGame();
      return;
    }
    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
  } else if (mode === 'computer') {
    board[index] = 'X';
    if (checkWin('X')) {
      alert('You win!');
      startGame();
      return;
    }
    computerMove();
  }
  renderBoard();
}

function computerMove() {
  let emptyCells = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
  if (emptyCells.length === 0) return;

  let moveIndex;
  if (difficulty === 'super-easy' || difficulty === 'easy') {
    moveIndex = emptyCells[Math.floor(Math.random() * emptyCells.length)];
  } else if (difficulty === 'medium') {
    moveIndex = emptyCells[0]; // simple first available strategy
  } else if (difficulty === 'hard' || difficulty === 'extra-hard' || difficulty === 'extreme-hard') {
    moveIndex = bestMove();
  }

  board[moveIndex] = 'O';
  if (checkWin('O')) {
    alert('Computer wins!');
    startGame();
    return;
  }
}

function checkWin(player) {
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];
  return wins.some(combo => combo.every(i => board[i] === player));
}

// Very simple AI for hard levels
function bestMove() {
  // Pick center if free
  if (board[4] === '') return 4;
  // Otherwise pick random empty
  let emptyCells = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
  return emptyCells[Math.floor(Math.random() * emptyCells.length)];
}
</script>
</body>
</html>
