<!DOCTYPE html>
<html>
<head>
<title>X & O - Hard</title>
<style>
body { text-align:center; font-family:Arial; background:#000; color:#fff; }
table { margin:20px auto; border-collapse: collapse; }
td { width:80px; height:80px; border:2px solid #ff9900; font-size:50px; text-align:center; cursor:pointer; }
.back-home { display:block; margin:15px auto; background:#ff9900; color:white; padding:10px 15px; border-radius:6px; text-decoration:none; width:120px; text-align:center;}
</style>
</head>
<body>

<h1>X & O - Hard</h1>
<table id="board">
<tr><td></td><td></td><td></td></tr>
<tr><td></td><td></td><td></td></tr>
<tr><td></td><td></td><td></td></tr>
</table>
<a href="index.html" class="back-home">🏠 Back to Home</a>

<script>
const boardEl = document.getElementById("board");
let board = [["","",""],["","",""],["","",""]];
const human = "X", ai = "O";

// Minimax AI
boardEl.querySelectorAll("td").forEach((cell, idx)=>{
    cell.addEventListener("click", ()=>{
        const row = Math.floor(idx/3);
        const col = idx%3;
        if(board[row][col]===""){
            board[row][col]=human;
            cell.textContent=human;
            if(checkWin(board,human)){ alert("🎉 You Win!"); reset(); return; }
            if(isDraw(board)){ alert("🤝 Draw!"); reset(); return; }
            aiMove();
            if(checkWin(board,ai)){ alert("💀 AI Wins!"); reset(); return; }
            if(isDraw(board)){ alert("🤝 Draw!"); reset(); return; }
        }
    });
});

function aiMove(){
    let bestScore = -Infinity;
    let move;
    for(let r=0;r<3;r++){
        for(let c=0;c<3;c++){
            if(board[r][c]===""){
                board[r][c]=ai;
                let score = minimax(board,0,false);
                board[r][c]="";
                if(score>bestScore){ bestScore=score; move={r,c}; }
            }
        }
    }
    if(move){
        board[move.r][move.c]=ai;
        boardEl.rows[move.r].cells[move.c].textContent=ai;
    }
}

function minimax(b, depth, isMax){
    if(checkWin(b,ai)) return 10-depth;
    if(checkWin(b,human)) return depth-10;
    if(isDraw(b)) return 0;

    if(isMax){
        let maxEval=-Infinity;
        for(let r=0;r<3;r++){
            for(let c=0;c<3;c++){
                if(b[r][c]===""){
                    b[r][c]=ai;
                    let eval=minimax(b,depth+1,false);
                    b[r][c]="";
                    maxEval=Math.max(maxEval,eval);
                }
            }
        }
        return maxEval;
    } else {
        let minEval=Infinity;
        for(let r=0;r<3;r++){
            for(let c=0;c<3;c++){
                if(b[r][c]===""){
                    b[r][c]=human;
                    let eval=minimax(b,depth+1,true);
                    b[r][c]="";
                    minEval=Math.min(minEval,eval);
                }
            }
        }
        return minEval;
    }
}

function checkWin(b,player){
    return (
        b[0][0]===player && b[0][1]===player && b[0][2]===player ||
        b[1][0]===player && b[1][1]===player && b[1][2]===player ||
        b[2][0]===player && b[2][1]===player && b[2][2]===player ||
        b[0][0]===player && b[1][0]===player && b[2][0]===player ||
        b[0][1]===player && b[1][1]===player && b[2][1]===player ||
        b[0][2]===player && b[1][2]===player && b[2][2]===player ||
        b[0][0]===player && b[1][1]===player && b[2][2]===player ||
        b[0][2]===player && b[1][1]===player && b[2][0]===player
    );
}

function isDraw(b){
    return b.flat().every(cell=>cell!=="");
}

function reset(){
    board=[["","",""],["","",""],["","",""]];
    boardEl.querySelectorAll("td").forEach(c=>c.textContent="");
}
</script>

</body>
</html>
