<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Snake Game - Blevic Superstore</title>
<style>
body{display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:Arial; margin:0; background:#222; color:white;}
#snakeCanvas{background:#111; margin-top:20px; border:2px solid #ff9900;}
#controls{display:grid; grid-template-columns:repeat(3,60px); grid-template-rows:repeat(3,60px); gap:10px; margin-top:20px;}
#controls button{font-size:24px; border:none; border-radius:8px; background:#ff6a00; color:white; cursor:pointer;}
#controls .empty{background:transparent; cursor:default;}
</style>
</head>
<body>

<h2>Snake Game</h2>
<canvas id="snakeCanvas" width="300" height="300"></canvas>

<div id="controls">
  <div class="empty"></div>
  <button onclick="changeDirection('up')">⬆</button>
  <div class="empty"></div>
  <button onclick="changeDirection('left')">⬅</button>
  <div class="empty"></div>
  <button onclick="changeDirection('right')">➡</button>
  <div class="empty"></div>
  <button onclick="changeDirection('down')">⬇</button>
  <div class="empty"></div>
</div>

<script>
const canvas=document.getElementById('snakeCanvas');
const ctx=canvas.getContext('2d');
const scale=15;
let direction='right';
let snake=[{x:5*scale,y:5*scale}];
let food={x:Math.floor(Math.random()*20)*scale, y:Math.floor(Math.random()*20)*scale};
let powerups=[];

function changeDirection(dir){ direction=dir; }

function draw(){
  ctx.fillStyle="#111";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Draw snake
  ctx.fillStyle="#0f0";
  snake.forEach(s=> ctx.fillRect(s.x,s.y,scale,scale));

  // Draw food
  ctx.fillStyle="#f00";
  ctx.fillRect(food.x,food.y,scale,scale);

  // Draw power-ups
  ctx.fillStyle="#ff0";
  powerups.forEach(p=> ctx.fillRect(p.x,p.y,scale,scale));
}

function update(){
  let head={...snake[0]};
  if(direction==='right') head.x+=scale;
  if(direction==='left') head.x-=scale;
  if(direction==='up') head.y-=scale;
  if(direction==='down') head.y+=scale;

  // Wall wrap
  if(head.x>=canvas.width) head.x=0;
  if(head.x<0) head.x=canvas.width-scale;
  if(head.y>=canvas.height) head.y=0;
  if(head.y<0) head.y=canvas.height-scale;

  snake.unshift(head);

  // Eat food
  if(head.x===food.x && head.y===food.y){
    food={x:Math.floor(Math.random()*20)*scale, y:Math.floor(Math.random()*20)*scale};
    if(Math.random()<0.2){ // 20% chance spawn power-up
      powerups.push({x:Math.floor(Math.random()*20)*scale,y:Math.floor(Math.random()*20)*scale});
    }
  }else{
    snake.pop();
  }

  // Eat power-ups
  powerups.forEach((p,i)=>{
    if(head.x===p.x && head.y===p.y){
      powerups.splice(i,1);
      snake.push({...snake[snake.length-1]}); // grow snake
    }
  });

  draw();
}

setInterval(update,200); // game speed
</script>

</body>
</html>
