<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<style>
body{
font-family:Arial;
margin:0;
padding:0;
text-align:center;
background:#f4f4f4;
}
.header{
background:#ff9900;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}
#gameCanvas{
background:#333;
margin-top:20px;
border-radius:10px;
}
.controls{
margin-top:15px;
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}
.controls button{
padding:15px;
border:none;
border-radius:10px;
background:#ff9900;
color:white;
font-size:18px;
cursor:pointer;
width:70px;
height:70px;
}
.levels{
margin-top:15px;
}
</style>
</head>
<body>

<div class="header">🐍 Snake Game</div>

<canvas id="gameCanvas" width="300" height="400"></canvas>

<div class="levels">
<label>Choose Level: </label>
<select id="levelSelect" onchange="changeLevel()">
<option value="200">Very Slow</option>
<option value="150">Slow</option>
<option value="100" selected>Medium</option>
<option value="70">Fast</option>
<option value="40">Super Fast</option>
</select>
</div>

<div class="controls">
<button onclick="changeDirection('up')">⬆</button>
<button onclick="changeDirection('left')">⬅</button>
<button onclick="changeDirection('down')">⬇</button>
<button onclick="changeDirection('right')">➡</button>
</div>

<script>
let canvas = document.getElementById("gameCanvas")
let ctx = canvas.getContext("2d")

let box = 20
let snake = []
snake[0] = {x: 10*box, y:10*box}

let food = {x: Math.floor(Math.random()*15)*box, y:Math.floor(Math.random()*19)*box}
let score = 0
let direction = null
let speed = 100 // default medium

// power-up: adds extra score
function spawnFood(){
food = {x: Math.floor(Math.random()*15)*box, y:Math.floor(Math.random()*19)*box}
}

document.addEventListener("keydown",move)
function move(event){
if(event.keyCode==37 && direction!="right") direction="left"
else if(event.keyCode==38 && direction!="down") direction="up"
else if(event.keyCode==39 && direction!="left") direction="right"
else if(event.keyCode==40 && direction!="up") direction="down"
}

function changeDirection(dir){
if(dir=="left" && direction!="right") direction="left"
if(dir=="right" && direction!="left") direction="right"
if(dir=="up" && direction!="down") direction="up"
if(dir=="down" && direction!="up") direction="down"
}

function draw(){
ctx.fillStyle="#333"
ctx.fillRect(0,0,canvas.width,canvas.height)

// draw snake
for(let i=0;i<snake.length;i++){
ctx.fillStyle = i==0?"lime":"green"
ctx.fillRect(snake[i].x,snake[i].y,box,box)
ctx.strokeStyle="#111"
ctx.strokeRect(snake[i].x,snake[i].y,box,box)
}

// draw food
ctx.fillStyle="red"
ctx.fillRect(food.x,food.y,box,box)

// snake head moves
let snakeX = snake[0].x
let snakeY = snake[0].y

if(direction=="left") snakeX -= box
if(direction=="right") snakeX += box
if(direction=="up") snakeY -= box
if(direction=="down") snakeY += box

// check collision
for(let i=1;i<snake.length;i++){
if(snakeX==snake[i].x && snakeY==snake[i].y){
alert("Game Over! Score: "+score)
snake = [{x:10*box,y:10*box}]
direction=null
score=0
spawnFood()
return
}
}

if(snakeX==food.x && snakeY==food.y){
score++
spawnFood()
}else{
snake.pop()
}

snake.unshift({x:snakeX, y:snakeY})

// display score
ctx.fillStyle="white"
ctx.font="18px Arial"
ctx.fillText("Score: "+score,10,20)
}

let gameInterval = setInterval(draw,speed)

function changeLevel(){
speed = parseInt(document.getElementById("levelSelect").value)
clearInterval(gameInterval)
gameInterval = setInterval(draw,speed)
}
</script>
</body>
</html>
