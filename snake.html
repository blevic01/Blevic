<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Snake Game</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#222;
color:white;
}

canvas{
background:black;
}

button{
margin:5px;
padding:10px;
}

</style>

</head>

<body>

<h2>Snake Game</h2>

<p>Select Speed</p>

<button onclick="startGame(300)">Very Slow</button>
<button onclick="startGame(150)">Medium</button>
<button onclick="startGame(90)">Fast</button>
<button onclick="startGame(50)">Super Fast</button>

<br><br>

<canvas id="game" width="300" height="300"></canvas>

<script>

let canvas=document.getElementById("game")
let ctx=canvas.getContext("2d")

let snake=[{x:10,y:10}]
let food={x:5,y:5}
let power={x:15,y:15}

let dx=1
let dy=0

let score=0
let gameLoop

document.addEventListener("keydown",changeDirection)

function startGame(speed){

clearInterval(gameLoop)

snake=[{x:10,y:10}]
score=0

gameLoop=setInterval(draw,speed)

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,300,300)

ctx.fillStyle="lime"

snake.forEach(part=>{
ctx.fillRect(part.x*15,part.y*15,14,14)
})

ctx.fillStyle="red"
ctx.fillRect(food.x*15,food.y*15,14,14)

ctx.fillStyle="blue"
ctx.fillRect(power.x*15,power.y*15,14,14)

let head={
x:snake[0].x+dx,
y:snake[0].y+dy
}

snake.unshift(head)

if(head.x==food.x && head.y==food.y){

score+=1

food={
x:Math.floor(Math.random()*20),
y:Math.floor(Math.random()*20)
}

}else if(head.x==power.x && head.y==power.y){

score+=5

power={
x:Math.floor(Math.random()*20),
y:Math.floor(Math.random()*20)
}

}else{

snake.pop()

}

}

function changeDirection(e){

if(e.key=="ArrowUp"){dx=0;dy=-1}
if(e.key=="ArrowDown"){dx=0;dy=1}
if(e.key=="ArrowLeft"){dx=-1;dy=0}
if(e.key=="ArrowRight"){dx=1;dy=0}

}

</script>

</body>
</html>
