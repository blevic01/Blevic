<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Puzzle Game</title>

<style>

body{
text-align:center;
font-family:Arial;
background:#111;
color:white;
}

.grid{

display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
margin-top:40px;

}

.tile{

width:100px;
height:100px;
background:#ff9900;
display:flex;
align-items:center;
justify-content:center;
font-size:25px;
cursor:pointer;

}

</style>

</head>

<body>

<h2>🧩 Number Puzzle</h2>

<p>Arrange numbers from 1 - 8</p>

<div class="grid" id="grid"></div>

<script>

let numbers=[1,2,3,4,5,6,7,8,""]

numbers.sort(()=>0.5-Math.random())

let grid=document.getElementById("grid")

numbers.forEach(num=>{

let div=document.createElement("div")

div.className="tile"

div.innerText=num

div.onclick=function(){

if(div.innerText!=""){

alert("Move the numbers until they are in order!")

}

}

grid.appendChild(div)

})

</script>

</body>
</html>
